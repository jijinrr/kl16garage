name: kl16pro
description: "KL16 Garage Pro — Vehicle Wash & Detailing Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase (Auth removed — local credential login is used)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # HTTP
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Responsive
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  lottie: ^3.1.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Media
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # PDF & QR
  pdf: ^3.11.1
  printing: ^5.13.2
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
